<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Temukan Teman Baru ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:linear-gradient(135deg,#ffb6d9,#ff75b5,#ff3d8d);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

overflow:hidden;

}

/* Hati Background */

body::before{

content:"❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️";

position:absolute;

font-size:35px;

opacity:.12;

top:0;

left:0;

width:100%;

height:100%;

display:flex;

justify-content:space-around;

align-items:center;

flex-wrap:wrap;

pointer-events:none;

}

/* Card */

.card{

position:relative;

background:white;

width:100%;

max-width:430px;

padding:30px;

border-radius:25px;

box-shadow:0 15px 35px rgba(0,0,0,.25);

text-align:center;

z-index:2;

}

/* Foto */

.profile{

width:190px;

height:190px;

border-radius:50%;

object-fit:cover;

border:7px solid #ff4f9b;

box-shadow:0 10px 25px rgba(0,0,0,.25);

margin-bottom:20px;

}

/* Judul */

h1{

font-size:34px;

color:#ff2d7a;

margin-bottom:15px;

}

/* Text */

p{

font-size:17px;

color:#555;

line-height:1.7;

margin-bottom:20px;

}

/* Kotak */

.info{

background:#fff1f7;

padding:18px;

border-radius:15px;

margin-bottom:25px;

text-align:left;

}

.info p{

margin:8px 0;

font-size:16px;

}

/* Tombol */

.button{

display:block;

background:#ff2f7f;

color:white;

text-decoration:none;

padding:18px;

border-radius:15px;

font-size:22px;

font-weight:bold;

transition:.3s;

box-shadow:0 8px 20px rgba(255,0,102,.35);

}

.button:hover{

background:#ff0066;

transform:scale(1.05);

}

/* Footer */

.footer{

margin-top:20px;

font-size:13px;

color:#999;

}

</style>

</head>

<body>

<div class="card">

<img src="foto.jpg" class="profile">

<h1>❤️ Temukan Teman Baru</h1>

<p>

Bergabunglah sekarang dan temukan seseorang yang memiliki minat yang sama denganmu.

</p>

</div>

<a class="button" href="https://tinyurl.com/7xeapcww">

💘 MULAI SEKARANG

</a>

</div>

</div>

</body>

</html>
