<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Entdecke Mich</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:#ff4d9d;
}

/* Background blur */
.bg{
position:fixed;
width:100%;
height:100%;
background:url("foto.jpg") center center;
background-size:cover;
filter:blur(20px) brightness(.55);
transform:scale(1.2);
z-index:-2;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(rgba(255,90,170,.35),rgba(255,0,120,.65));
z-index:-1;
}

.card{

position:relative;
width:350px;
background:#fff;
border-radius:35px;
padding:35px 20px 40px;
text-align:center;
box-shadow:0 25px 50px rgba(0,0,0,.25);

}

/* FOTO */

.photo{

width:250px;
height:250px;
margin:auto;
border-radius:50%;
overflow:hidden;
border:10px solid #ff2f8d;
box-shadow:0 15px 35px rgba(0,0,0,.35);
animation:floating 3s ease-in-out infinite;

}

.photo img{

width:100%;
height:100%;
object-fit:cover;

}

@keyframes floating{

0%{
transform:translateY(0px) scale(1);
}

50%{
transform:translateY(-15px) scale(1.05);
}

100%{
transform:translateY(0px) scale(1);
}

}

/* TEXT */

.text{

margin-top:30px;
font-size:58px;
font-weight:bold;
color:#ff2f8d;
line-height:1.05;
text-shadow:0 5px 15px rgba(255,0,120,.3);

}

.heart{

font-size:60px;
animation:beat 1s infinite;

}

@keyframes beat{

50%{
transform:scale(1.25);
}

}

/* BUTTON */

.click{

position:absolute;
right:-95px;
top:180px;
width:150px;
height:150px;
background:linear-gradient(135deg,#ff2d8b,#ff006a);
border-radius:25px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:#fff;
font-size:34px;
font-weight:bold;
box-shadow:0 15px 35px rgba(255,0,120,.45);
animation:pulse 1.2s infinite;

}

@keyframes pulse{

50%{
transform:scale(1.08);
}

}

/* HAND */

.hand{

position:absolute;
right:-35px;
top:290px;
font-size:85px;
animation:point 1s infinite;

}

@keyframes point{

0%{
transform:translateX(0);
}

50%{
transform:translateX(-18px);
}

100%{
transform:translateX(0);
}

}

.smallheart{

position:absolute;
top:8px;
left:50%;
transform:translateX(-50%);
font-size:28px;
animation:beat 1s infinite;

}

</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="card">

<div class="photo">
<img src="foto.jpg.jpg">
</div>

<div class="text">
<div class="heart">❤️</div>

Na,<br>

neugierig?<br>

Entdecke<br>

mich hier

</div>

<div class="click">

<div class="smallheart">💘</div>

KLICKE<br>

HIER

</div>

<div class="hand">
👉
</div>

</div>

</body>
</html>
